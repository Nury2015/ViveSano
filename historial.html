<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/historial.css">
  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>Mi Historial — ViveSano</title>
</head>
<body>

<div id="menu"></div>

<div class="historial-wrap">

  <h1>Mi Historial</h1>

  <!-- RESUMEN RÁPIDO -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- ══ PLANES DEL DÍA ══════════════════════════════════ -->
  <section class="hist-section">
    <div class="hist-sec-header">
      <h2>📋 Planes del día</h2>
      <button class="btn-borrar-sec" onclick="borrarTodosPlanes()">🗑️ Borrar todos</button>
    </div>
    <div id="planesLista" class="planes-lista"></div>
  </section>

  <!-- ══ RECETAS GUARDADAS ════════════════════════════════ -->
  <section class="hist-section">
    <div class="hist-sec-header">
      <h2>🍽️ Recetas guardadas</h2>
      <button class="btn-borrar-sec" onclick="borrarTodasRecetasGuardadas()">🗑️ Borrar todas</button>
    </div>
    <div class="hist-filtros">
      <button class="hfil activo" data-tipo="todos">Todos</button>
      <button class="hfil" data-tipo="desayuno">🌅 Desayunos</button>
      <button class="hfil" data-tipo="once">🍎 Onces</button>
      <button class="hfil" data-tipo="almuerzo">☀️ Almuerzos</button>
      <button class="hfil" data-tipo="cena">🌙 Cenas</button>
    </div>
    <div id="recetasGrid" class="recetas-grid"></div>
  </section>

  <!-- ══ INGREDIENTES FAVORITOS ═══════════════════════════ -->
  <section class="hist-section">
    <div class="hist-sec-header">
      <h2>⭐ Ingredientes favoritos</h2>
      <button class="btn-borrar-sec" onclick="borrarTodosFavoritos()">🗑️ Borrar todos</button>
    </div>
    <div id="ingredientesFav" class="ing-chips"></div>
    <p id="ing-vacio" style="display:none;color:#aaa;font-size:13px;padding:12px 0">
      No tienes ingredientes favoritos. Ve a
      <a href="recetas.html">Recetas</a> y guarda tus ingredientes.
    </p>
  </section>

</div>

<a href="recetas.html" class="volver">← Ir a recetas</a>

<script src="js/menu.js"></script>
<script>
fetch("components/menu.html")
  .then(r => r.text())
  .then(data => {
    document.getElementById("menu").innerHTML = data;
    setTimeout(() => iniciarMenu(), 0);
  });
</script>
<script src="js/historial.js"></script>
</body>
</html>

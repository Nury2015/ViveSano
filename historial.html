<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/historial.css">
  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>Mi Historial — ViveSano</title>
</head>
<body>

<div id="menu"></div>

<div class="historial-wrap">

  <h1>Mi Historial</h1>

  <!-- RESUMEN -->
  <div class="stats-bar" id="stats-bar"></div>

  <!-- INGREDIENTES FAVORITOS -->
  <section class="ing-fav-sec">
    <h2>⭐ Mis ingredientes favoritos</h2>
    <div id="ingredientesFav" class="ing-chips"></div>
    <p id="ing-vacio" style="display:none;color:#aaa;font-size:13px">
      No tienes ingredientes favoritos guardados aún.
      <a href="recetas.html">Ir a recetas</a> y usa el selector de ingredientes.
    </p>
  </section>

  <!-- FILTROS POR TIPO -->
  <section class="recetas-sec">
    <div class="sec-header-row">
      <h2>🍽️ Recetas guardadas</h2>
      <div class="hist-filtros">
        <button class="hfil activo" data-tipo="todos">Todos</button>
        <button class="hfil" data-tipo="plan_dia">📋 Planes</button>
        <button class="hfil" data-tipo="desayuno">🌅 Desayunos</button>
        <button class="hfil" data-tipo="once">🍎 Onces</button>
        <button class="hfil" data-tipo="almuerzo">☀️ Almuerzos</button>
        <button class="hfil" data-tipo="cena">🌙 Cenas</button>
      </div>
    </div>
    <div id="recetasGrid" class="recetas-grid"></div>
  </section>

</div>

<a href="index.html" class="volver">⬅ Volver a la calculadora</a>

<script src="js/menu.js"></script>
<script>
fetch("components/menu.html")
  .then(r => r.text())
  .then(data => {
    document.getElementById("menu").innerHTML = data;
    setTimeout(() => iniciarMenu(), 0);
  });
</script>
<script src="js/historial.js"></script>
</body>
</html>

<html lang="es">
<head>

</head>

<body>

<div id="menu"></div>

<header>
  <h1>Tu Plan Nutricional Personalizado 🍃</h1>
  <p>Recetas adaptadas a tus objetivos y necesidades</p>
</header>

<div class="filtros">
  <button>Bajo en calorías</button>
  <button>Alto en proteína</button>
  <button>Vegetariano</button>
  <button>Rápido</button>
</div>

<!-- 👇 CONTENEDOR DINÁMICO -->
<div class="contenedor" id="contenedorRecetas"></div>

<a href="index.html" class="volver">⬅ Volver a la calculadora</a>

<!-- MENU -->
<script src="menu.js"></script>

<script>
fetch("menu.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("menu").innerHTML = data;

    setTimeout(() => {
      iniciarMenu();
    }, 0);
  });

<!-- GENERADOR -->
<script src="generador.js"></script>

<script>
  console.log(typeof generarReceta);
// ===============================
// GENERAR TARJETAS AUTOMÁTICAS
// ===============================

if (!alimentos || alimentos.length === 0) {
  console.warn("Aún no hay alimentos");
} else {
  mostrarRecetas();
}
function mostrarRecetas() {
  const contenedor = document.getElementById("contenedorRecetas");

  contenedor.innerHTML = "";

  for (let i = 0; i < 6; i++) {

    let receta = generarReceta();

    if (!receta) continue; // 🔥 CORREGIDO

    const chips = generarChips(receta);

    contenedor.innerHTML += `
      <div class="tarjeta">
        <img src="https://source.unsplash.com/400x300/?healthy-food" alt="">

        <div class="contenido">
          <h3>${receta.nombre}</h3>
          <p>Receta personalizada según tus necesidades nutricionales.</p>

          <div class="chips">
            ${chips}
          </div>

          <div class="botones">
            <button class="ver" onclick='verReceta(${JSON.stringify(receta)})'>Ver receta</button>
            <button class="guardar" onclick='guardarDesdeLista(${JSON.stringify(receta)})'>Guardar</button>
          </div>
        </div>
      </div>
    `;
  }
}


// ===============================
// GENERAR CHIPS BONITOS
// ===============================
function generarChips(receta) {
  let chips = [];

  if (receta.calorias < 400) chips.push("Bajo en calorías");

  if (receta.ingredientes.some(i => i.proteinas > 5)) {
    chips.push("Alto en proteína");
  }

  if (receta.ingredientes.every(i => i.grasas < 5)) {
    chips.push("Bajo en grasa");
  }

  return chips.map(c => `<span>${c}</span>`).join("");
}


// ===============================
// VER RECETA
// ===============================
function verReceta(receta) {
  localStorage.setItem("recetaActual", JSON.stringify(receta));
  window.location.href = "detalleDeReceta.html";
}


// ===============================
// GUARDAR DESDE LISTA
// ===============================
function guardarDesdeLista(receta) {
  let historial = JSON.parse(localStorage.getItem("historial")) || [];

  historial.push(receta);

  localStorage.setItem("historial", JSON.stringify(historial));

  alert("Receta guardada 💚");
}



</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Progreso — ViveSano</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/progreso.css">
  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
</head>
<body>

<div id="menu"></div>

<main class="prog-main">

  <!-- Cabecera -->
  <div class="prog-header">
    <h1>📊 Mi Progreso</h1>
    <p>Registra tu peso, visualiza tu evolución y comprueba si vas cumpliendo tu objetivo</p>
  </div>

  <!-- Stats -->
  <div id="prog-stats" class="prog-stats"></div>

  <!-- Objetivo activo -->
  <div id="prog-objetivo" class="prog-objetivo"></div>

  <!-- Gráfica de evolución -->
  <div class="prog-card">
    <div class="prog-card-header">
      <h3>📈 Evolución de peso</h3>
    </div>
    <div class="prog-chart-wrap" id="prog-chart-wrap"></div>
  </div>

  <!-- Composición corporal -->
  <div id="prog-composicion-wrap"></div>

  <!-- Formulario de registro -->
  <div class="prog-card">
    <div class="prog-card-header">
      <h3>⚖️ Registrar pesaje</h3>
    </div>
    <div class="prog-form">
      <div class="prog-form-row">
        <div class="prog-campo">
          <label>Fecha</label>
          <input type="date" id="inp-fecha-peso">
        </div>
        <div class="prog-campo">
          <label>Peso (kg)</label>
          <input type="number" id="inp-peso-reg" step="0.1" min="20" max="400" placeholder="75.5">
        </div>
      </div>
      <div class="prog-form-row">
        <div class="prog-campo">
          <label>Cintura (cm) <span style="font-weight:400;color:#aaa">opcional</span></label>
          <input type="number" id="inp-cintura-reg" step="0.5" min="40" max="200" placeholder="82">
        </div>
        <div class="prog-campo">
          <label>Cadera (cm) <span style="font-weight:400;color:#aaa">opcional</span></label>
          <input type="number" id="inp-cadera-reg" step="0.5" min="50" max="200" placeholder="95">
        </div>
      </div>
      <div class="prog-campo">
        <label>Nota (opcional)</label>
        <input type="text" id="inp-nota-peso" placeholder="Ej: después del gym, con ropa ligera…"
               maxlength="60">
      </div>
      <div id="prog-form-msg" class="prog-form-msg"></div>
      <button class="btn-registrar" onclick="registrarPeso()">💾 Guardar pesaje</button>
    </div>
  </div>

  <!-- Historial de registros -->
  <div class="prog-card">
    <div class="prog-card-header">
      <h3>🗒️ Historial</h3>
      <span id="prog-hist-count" style="font-size:12px;color:#888"></span>
    </div>
    <div id="prog-hist-lista" class="prog-hist-lista"></div>
  </div>

</main>

<script src="js/menu.js"></script>
<script>
fetch("components/menu.html")
  .then(r => r.text())
  .then(data => {
    document.getElementById("menu").innerHTML = data;
    setTimeout(() => iniciarMenu(), 0);
  });
</script>
<script src="js/progreso.js"></script>
<script src="js/auth.js"></script>
<script>
auth.onAuthStateChanged(async (user) => {
  if (!user) return;
  // Sincronizar datos físicos del perfil → localStorage para el IMC
  try {
    const doc = await db.collection("usuarios").doc(user.uid).get();
    if (doc.exists) {
      const datos = doc.data();
      const local = JSON.parse(localStorage.getItem("datosUsuario") || "{}");
      localStorage.setItem("datosUsuario", JSON.stringify({ ...local, ...datos }));
      // Re-render stats con datos actualizados (estatura para IMC)
      renderTodo();
    }
  } catch(e) {}
  if (typeof actualizarNavUsuario === "function") actualizarNavUsuario(user);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analizar mi plato — ViveSano</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/analizar-plato.css">
  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Firebase solo para auth/nav -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
</head>
<body>

<div id="menu"></div>

<main class="ap-main">

  <!-- Cabecera -->
  <div class="ap-header">
    <h1>📸 Analizar mi plato</h1>
    <p>Toma una foto de tu comida y la IA identifica los alimentos, estima calorías y te dice cómo mejorar el plato según tu perfil.</p>
  </div>

  <!-- Panel reservado (no visible en producción) -->
  <div id="ap-panel-apikey" style="display:none"></div>

  <!-- Inputs ocultos para imagen -->
  <input type="file" id="ap-input-camara"  accept="image/*" capture="environment"
         onchange="onImagenSeleccionada(event)">
  <input type="file" id="ap-input-galeria" accept="image/*"
         onchange="onImagenSeleccionada(event)">

  <!-- Card de captura -->
  <div id="ap-capture-card" class="ap-capture-card" style="display:none">
    <div id="ap-preview-wrap" class="ap-preview-wrap" onclick="abrirCamara()">
      <div class="ap-preview-placeholder">
        <span class="ap-cam-ico">📷</span>
        <p>Toca aquí para tomar una foto<br>
          <span style="font-size:12px;color:#bbb">o usa los botones de abajo</span></p>
      </div>
    </div>
    <div class="ap-btns">
      <button class="ap-btn ap-btn-camara" onclick="abrirCamara()">
        <i class="fa-solid fa-camera"></i> Cámara
      </button>
      <button class="ap-btn ap-btn-galeria" onclick="abrirGaleria()">
        <i class="fa-solid fa-image"></i> Galería
      </button>
      <button id="ap-btn-analizar" class="ap-btn ap-btn-analizar"
              onclick="analizarPlato()" disabled>
        <i class="fa-solid fa-magnifying-glass"></i> Analizar
      </button>
    </div>
  </div>

  <!-- Resultado -->
  <div id="ap-resultado" class="ap-resultado" style="display:none"></div>

</main>

<script src="js/menu.js"></script>
<script>
fetch("components/menu.html")
  .then(r => r.text())
  .then(data => {
    document.getElementById("menu").innerHTML = data;
    setTimeout(() => iniciarMenu(), 0);
  });
</script>
<script src="js/analizar-plato.js"></script>
<script src="js/auth.js"></script>
<script>
auth.onAuthStateChanged(user => {
  if (user && typeof actualizarNavUsuario === "function") actualizarNavUsuario(user);
});
</script>

</body>
</html>

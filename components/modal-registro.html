<div id="modal-registro" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:3000;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto">
  <div style="background:white;border-radius:18px;padding:24px 22px;max-width:420px;width:100%;margin:auto;box-shadow:0 8px 32px rgba(0,0,0,0.2)">

    <div style="text-align:center;margin-bottom:18px">
      <div style="font-size:40px;margin-bottom:6px">🥗</div>
      <h3 style="margin:0 0 4px;color:#1b5233;font-size:19px;font-family:'Segoe UI',sans-serif">Ingresa tus datos</h3>
      <p style="margin:0;font-size:13px;color:#888;font-family:'Segoe UI',sans-serif">
        Solo los usamos para calcular tus calorías y guardar tus recetas
      </p>
    </div>

    <form id="reg-form" style="display:flex;flex-direction:column;gap:12px;font-family:'Segoe UI',sans-serif">

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
        <div>
          <label style="font-size:11px;color:#555;font-weight:600;display:block;margin-bottom:3px">Peso (kg)</label>
          <input id="reg-peso" type="number" min="30" max="250" required placeholder="70"
            style="width:100%;padding:9px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;box-sizing:border-box">
        </div>
        <div>
          <label style="font-size:11px;color:#555;font-weight:600;display:block;margin-bottom:3px">Estatura (cm)</label>
          <input id="reg-estatura" type="number" min="100" max="250" required placeholder="170"
            style="width:100%;padding:9px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;box-sizing:border-box">
        </div>
        <div>
          <label style="font-size:11px;color:#555;font-weight:600;display:block;margin-bottom:3px">Edad</label>
          <input id="reg-edad" type="number" min="5" max="110" required placeholder="30"
            style="width:100%;padding:9px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;box-sizing:border-box">
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <label style="font-size:11px;color:#555;font-weight:600;display:block;margin-bottom:3px">Sexo</label>
          <select id="reg-sexo" required style="width:100%;padding:9px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;background:white;box-sizing:border-box">
            <option value="">Selecciona</option>
            <option value="m">Masculino</option>
            <option value="f">Femenino</option>
          </select>
        </div>
        <div>
          <label style="font-size:11px;color:#555;font-weight:600;display:block;margin-bottom:3px">Actividad física</label>
          <select id="reg-actividad" required style="width:100%;padding:9px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;background:white;box-sizing:border-box">
            <option value="">Selecciona</option>
            <option value="sedentario">Sedentario</option>
            <option value="leve">Leve (1-3 días/sem)</option>
            <option value="moderado">Moderado (3-5 días)</option>
            <option value="activo">Activo (6-7 días)</option>
            <option value="muy_activo">Muy activo</option>
          </select>
        </div>
      </div>

      <div>
        <label style="font-size:11px;color:#555;font-weight:600;display:block;margin-bottom:3px">¿Tienes alguna condición médica?</label>
        <select id="reg-enfermedad" style="width:100%;padding:9px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;background:white;box-sizing:border-box">
          <option value="ninguna">Ninguna</option>
          <option value="diabetes">Diabetes</option>
          <option value="hipertension">Hipertensión</option>
          <option value="colesterol">Colesterol alto</option>
          <option value="obesidad">Obesidad / Sobrepeso</option>
          <option value="celiaquia">Celiaquía (intolerancia al gluten)</option>
          <option value="gastritis">Gastritis</option>
          <option value="tiroides">Problemas de tiroides</option>
          <option value="renal">Enfermedad renal</option>
          <option value="cardiaca">Enfermedad cardiovascular</option>
          <option value="digestiva">Problemas digestivos</option>
        </select>
      </div>

      <div>
        <label style="font-size:11px;color:#555;font-weight:600;display:block;margin-bottom:3px">¿Cuál es tu objetivo?</label>
        <select id="reg-objetivo" style="width:100%;padding:9px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;background:white;box-sizing:border-box">
          <option value="mantener">Mantener peso</option>
          <option value="bajar">Bajar grasa</option>
          <option value="masa">Ganar masa muscular</option>
          <option value="tonificar">Tonificar</option>
        </select>
      </div>

      <div style="display:flex;gap:8px;margin-top:4px">
        <button type="submit"
          style="flex:1;padding:12px;background:#2e7d32;color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer">
          Guardar y continuar →
        </button>
        <button type="button" onclick="cerrarModalRegistro()"
          style="padding:12px 16px;background:white;color:#888;border:1.5px solid #ddd;border-radius:10px;font-size:13px;cursor:pointer">
          Ahora no
        </button>
      </div>

    </form>
  </div>
</div>
